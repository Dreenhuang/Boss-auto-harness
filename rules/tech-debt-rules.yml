## 二、量化评估模型

### 2.1 技术债评分公式

```
总债务分值 = Σ(单项债务本金 × 时间因子 × 复杂度因子 × 影响因子)

其中：
- 单项债务本金: 基础分值（见下表）
- 时间因子: 1 + (存在天数 / 365) × 年利率
- 复杂度因子: 根据修改难度调整 (1.0-2.0)
- 影响因子: 根据影响范围调整 (1.0-3.0)
```

### 2.2 各类型基础分值表

| 债务类型 | 基础分值 | 说明 |
|---------|---------|------|
| TODO/FIXME | 10-30 | 根据内容判断严重性 |
| 魔法数字 | 5-15 | 每处计分 |
| 死代码 | 20-50 | 按代码块大小 |
| 代码重复 | 15-40 | 按重复行数 |
| 过长函数 | 10-25 | 超出限制的行数 |
| 循环依赖 | **50-80** | 架构问题，高代价 |
| 分层违规 | **40-70** | 违反架构约束 |
| 缺失测试 | **30-60** | 质量风险 |
| 过时文档 | 10-20 | 维护成本 |

### 2.3 时间衰减算法

```python
# 伪代码 - 技术债时间价值计算
def calculate_debt_with_interest(principal, days_old, annual_rate):
    """
    计算技术债的当前价值（含复利）
    
    参数:
        principal: 本金（基础分值）
        days_old: 存在天数
        annual_rate: 年利率（如0.05表示5%）
    
    返回:
        current_value: 当前债务总值
    """
    # 复利公式: A = P(1 + r)^t
    time_factor = (1 + annual_rate) ** (days_old / 365)
    current_value = principal * time_factor
    
    # 年龄惩罚（加速增长）
    if days_old > 90:   # 超过3个月
        current_value *= 1.5   # 1.5倍惩罚
    if days_old > 180:  # 超过6个月
        current_value *= 2.0   # 2倍惩罚
    if days_old > 365:  # 超过1年
        current_value *= 3.0   # 3倍惩罚（技术遗产！）
    
    return round(current_value, 2)


# 示例计算
# 一个FIXME标记，基础分值20，存在45天，年利率8%
debt_value = calculate_debt_with_interest(20, 45, 0.08)
# 结果: ≈ 22.19 （已经增值11%）
```

