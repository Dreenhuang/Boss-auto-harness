## 一、技术债分类体系

### 1.1 债务类型定义

```yaml
debt_categories:
  
  # 🔴 代码质量债 (Code Quality Debt)
  code_quality:
    subtypes:
      - name: todo_fixme
        label: "TODO/FIXME注释"
        description: "代码中的待办事项标记"
        base_interest_rate: 0.05  # 日利息5%
        
      - name: magic_numbers
        label: "魔法数字"
        description: "硬编码的数字字面量"
        base_interest_rate: 0.03
        
      - name: dead_code
        label: "死代码"
        description: "未使用的代码、被注释的代码块"
        base_interest_rate: 0.07
        
      - name: code_duplication
        label: "代码重复"
        description: "相似度超过阈值的重复代码块"
        base_interest_rate: 0.08
        
      - name: long_function
        label: "过长函数"
        description: "超过行数限制的函数/方法"
        base_interest_rate: 0.04
        
  # 🟡 架构设计债 (Architecture Debt)
  architecture:
    subtypes:
      - name: circular_dependency
        label: "循环依赖"
        description: "模块之间的循环引用"
        base_interest_rate: 0.10  # 高利息！
        
      - name: layer_violation
        label: "分层违规"
        description: "违反依赖分层规则"
        base_interest_rate: 0.09
        
      - name: god_class
        label: "上帝类/上帝对象"
        description: "承担过多职责的类"
        base_interest_rate: 0.06
        
      - name: tight_coupling
        label: "紧耦合"
        description: "模块间耦合度过高"
        base_interest_rate: 0.07
        
  # 🟠 测试债 (Testing Debt)
  testing:
    subtypes:
      - name: missing_tests
        label: "缺失测试"
        description: "没有对应测试的代码"
        base_interest_rate: 0.12  # 最高利息！
        
      - name: fragile_tests
        label: "脆弱测试"
        description: "容易失败的测试用例"
        base_interest_rate: 0.05
        
      - name: coverage_gap
        label: "覆盖率不足"
        description: "未达到覆盖率目标"
        base_interest_rate: 0.06
        
  # 🔵 文档债 (Documentation Debt)
  documentation:
    subtypes:
      - name: outdated_docs
        label: "过时文档"
        description: "与代码不一致的文档"
        base_interest_rate: 0.04
        
      - name: missing_docs
        label: "缺失文档"
        description: "缺少必要的API文档或注释"
        base_interest_rate: 0.03
```

