## 五、优先级排序算法

### 5.1 ROI驱动的优先级模型

```python
def calculate_priority_score(debt_item):
    """
    计算技术债修复的优先级分数
    
    公式: Priority = (Impact × Urgency) / Effort
    
    其中:
    - Impact: 修复后带来的正面影响 (1-10)
    - Urgency: 紧迫程度（基于年龄和增长率）(1-10)  
    - Effort: 修复所需的工作量 (1-10，越高越难)
    """
    
    impact = assess_impact(debt_item)
    urgency = calculate_urgency(debt_item['days_old'], debt_item['growth_rate'])
    effort = estimate_effort(debt_item['type'], debt_item['complexity'])
    
    priority = (impact * urgency) / effort
    
    return round(priority, 2)


def assess_impact(debt_item):
    """评估修复此债务的影响"""
    
    impact_factors = {
        'security_related': 10,    # 安全相关 → 最高影响
        'performance': 8,          # 性能相关
        'maintainability': 6,      # 可维护性
        'readability': 4,          # 可读性
        'consistency': 3,          # 一致性
    }
    
    base_impact = impact_factors.get(debt_item['category'], 5)
    
    # 影响范围加权
    scope_multiplier = {
        'single_file': 1.0,
        'module': 1.5,
        'cross_module': 2.0,
        'architecture': 3.0,
    }
    
    return base_impact * scope_multiplier.get(debt_item['scope'], 1.0)


def calculate_urgency(days_old, growth_rate):
    """计算紧迫程度"""
    
    base_urgency = min(10, days_old / 30)  # 每30天增加1点
    
    # 增长率加速
    if growth_rate > 0.1:  # 月增长>10%
        urgency *= 1.5
    if growth_rate > 0.2:  # 月增长>20%
        urgency *= 2.0
        
    return min(10, base_urgency)
```

