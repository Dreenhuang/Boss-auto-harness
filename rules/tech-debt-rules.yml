## 三、检测规则详解

### 3.1 TODO/FIXME 检测

```yaml
todo_detection:
  patterns:
    - regex: "(TODO|FIXME|HACK|XXX|BUG|OPTIMIZE)"
      flags: ["case_insensitive", "multiline"]
      
  content_analysis:
    # 通过内容判断严重程度
    severity_keywords:
      critical:
        - "安全"
        - "绕过"
        - "临时方案"
        - "hack"
        - "紧急"
        - "暂时"
      high:
        - "性能"
        - "优化"
        - "重构"
        - "待完善"
        - "需要改进"
      medium:
        - "考虑"
        - "可能"
        - "后续"
        - "将来"
      low:
        - "样式"
        - "格式"
        - "注释"
        
  aging_policy:
    fresh: "< 7天"       # 新鲜期，不催促
    stale: "7-30天"     # 变质期，开始提醒
    rotten: "> 30天"     # 腐烂期，强制升级
    legacy: "> 90天"     # 遗产级，阻断发布
```

### 3.2 魔法数字检测

```yaml
magic_number_detection:
  exclude_patterns:
    - "^[01]$"           # 允许 0 和 1
    - "^-1$"             # 允许 -1（常用于错误码）
    - "^\d{1,2}$"       # 允许 1-99 的简单计数器
    - "version.*\d+"     # 版本号
    - "port.*\d+"        # 端口号
    - "\/\*.*\*\/.*\d+" # 注释中的数字
    
  include_patterns:
    - "timeout.*=\s*\d{3,}"          # 超时 > 100ms 应该是常量
    - "interval.*=\s*\d{3,}"         # 间隔 > 100ms
    - "max.*=\s*\d{2,}"              # 最大值 > 10
    - "limit.*=\s*\d{2,}"            # 限制 > 10
    - "retry.*=\s*\d{1,}"            # 重试次数
    - "buffer.*size.*=\s*\d{3,}"     # 缓冲区大小
    - "page.*size.*=\s*\d{2,}"       # 分页大小
      
  same_file_threshold: 3   # 同一文件出现3+处才报告
  
  suggested_constants:
    pattern: "{MEANING}_const"
    location: "config/constants.ts"
```

### 3.3 死代码检测

```yaml
dead_code_detection:
  types:
    
    commented_out_code:
      min_lines: 5                # 连续注释>5行
      indicators:
        - "// old"
        - "// deprecated"
        - "// removed"
        - "// backup"
        - "/* 注释掉的代码"
        
    unused_exports:
      detection_method: "cross_reference"
      check_imports: true         # 检查是否有其他文件导入
      
    unused_functions:
      min_function_lines: 3       # 至少3行的函数
      exclude_test_files: true    # 排除测试文件中的helper
      
    unreachable_code:
      patterns:
        - "return\s+.*\n\s+.*"    # return后的代码
        - "throw\s+.*\n\s+.*"     # throw后的代码
        - "break\s*\n\s+.*"       # break后的代码
```

### 3.4 代码重复检测

```yaml
duplication_detection:
  method: "hash_based"            # 基于哈希的快速检测
  
  hash_algorithm:
    type: "rolling_hash"          # 滚动哈希（Rabin-Karp）
    window_size: 10               # 10行为一个窗口
    normalization:
      - remove_whitespace         # 移除空白字符
      - normalize_indentation     # 统一缩进
      - ignore_comments            # 忽略注释
      - normalize_variable_names   # 规范化变量名（可选）
      
  similarity_threshold: 0.80      # 80%相似度即判定为重复
  
  min_duplicate_lines: 5          # 最少重复5行才报告
  
  reporting:
    show_original: true           # 显示原始位置
    show_duplicates: true         # 显示所有重复位置
    suggest_extraction: true      # 建议提取为公共函数
```

