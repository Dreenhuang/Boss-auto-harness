## 六、集成配置

### 6.1 quality-gate 集成

```yaml
# 在 quality-gate/SKILL.md 中添加
tech_debt_check:
  enabled: true
  
  thresholds:
    blocking:
      max_critical_debt: 0        # 不允许致命级技术债
      max_total_score: 200       # 总分不超过200才允许合并
      
    warning:
      max_high_debt: 5           # 高优先级不超过5个
      max_new_debt_this_sprint: 10  # 本Sprint新增不超过10个
      
  actions_on_failure:
    block_merge: true            # 阻止合并
    create_jira: true            # 自动创建JIRA任务
    notify_team: true            # 通知团队
    suggest_refactor: true       # 建议重构方案
```

