## 四、自动化修复建议

### 4.1 修复建议模板库

```yaml
fix_suggestions:

  magic_numbers:
    template: |
      ## 修复建议：提取魔法数字为命名常量
      
      **位置**: {file_path}:{line_number}
      **当前代码**: `{code_snippet}`
      **魔法数值**: {magic_value}
      
      ### 推荐方案：
      
      1️⃣ 在 `src/config/constants.ts` 中添加：
      ```typescript
      export const {CONSTANT_NAME} = {magic_value}; // {meaning}
      ```
      
      2️⃣ 替换原代码中的硬编码值：
      ```typescript
      // Before
      {original_line}
      
      // After
      import {{CONSTANT_NAME}} from '@/config/constants';
      {fixed_line}
      ```
      
      **收益**: 
      - ✅ 提高可读性和可维护性
      - ✅ 便于统一修改
      - ✅ 减少魔法数字数量: {current_count} → {after_fix_count}
      
  code_duplication:
    template: |
      ## 修复建议：提取重复代码为共享函数
      
      **重复位置**:
      - {location_1}
      - {location_2}
      - ... (共{n}处)
      
      **重复行数**: {duplicate_lines} 行
      **相似度**: {similarity}%
      
      ### 推荐方案：
      
      1️⃣ 创建共享工具函数 `src/utils/{function_name}.ts`:
      ```typescript
      export function {function_name}({params}) {
        // 提取的通用逻辑
        {common_logic}
      }
      ```
      
      2️⃣ 在各调用处替换为：
      ```typescript
      import {{function_name}} from '@/utils/{function_name}';
      
      // 使用共享函数
      const result = {function_name}({args});
      ```
      
      **收益**:
      - ✅ 消除代码重复 (DRY原则)
      - ✅ 减少维护成本（只需改一处）
      - ✅ 代码量减少: ~{reduction_lines} 行
      
  todo_fixme:
    template: |
      ## 处理建议：解决 TODO/FIXME 标记
      
      **标记内容**: `{todo_content}`
      **位置**: {file_path}:{line_number}
      **存在天数**: {days_old} 天
      **当前等级**: {severity_level}
      
      ### 分析：
      
      {ai_analysis_of_todo}
      
      ### 推荐行动：
      
      {recommended_action}
      
      ⏰ **注意**: 此标记已存在 {days_old} 天，如继续拖延将升级为 **{next_level}**
```

