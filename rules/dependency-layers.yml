## 六、特殊场景处理

### 6.1 共享工具函数

```typescript
// 工具函数放在 config 层或独立的 utils/ 目录
// 规则：必须是纯函数，无副作用，不依赖业务状态

// ✅ 允许: utils/date.ts (纯工具)
export function formatDate(date: Date): string { ... }

// ✅ 允许: utils/string.ts (纯工具)
export function slugify(text: string): string { ... }

// ❌ 不允许: utils/api.ts (调用外部API)
```

### 6.2 类型共享

```typescript
// Types层可以跨项目共享
// 放在 packages/types 或 src/shared/types/

// ✅ 允许: 多个Layer都可以导入types
```

### 6.3 测试文件

```typescript
// 测试文件的分层遵循被测文件的层级
// tests/services/user.service.test.ts  → 可以导入service层及以下
// tests/components/UserList.test.tsx → 可以导入任何层（测试例外）
```
