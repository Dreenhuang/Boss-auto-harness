## 五、目录结构映射

```
src/
├── types/              ← Layer 1: 类型定义
│   ├── user.ts
│   ├── product.ts
│   └── index.ts
│
├── config/             ← Layer 2: 配置常量
│   ├── constants.ts
│   ├── env.ts
│   └── app.config.ts
│
├── data/               ← Layer 3: 数据访问
│   ├── repositories/
│   │   ├── user.repo.ts
│   │   └── product.repo.ts
│   └── models/
│
├── services/           ← Layer 4: 业务服务
│   ├── user.service.ts
│   ├── auth.service.ts
│   └── product.service.ts
│
├── api/                ← Layer 5: 运行时/API
│   ├── handlers/
│   ├── middleware/
│   └── routes/
│
└── components/         ← Layer 6: 界面
    ├── ui/
    ├── pages/
    └── hooks/
```

