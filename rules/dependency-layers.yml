## 四、集成方式

### 4.1 在 quality-gate 中启用

```yaml
# quality-gate SKILL.md 中增加检查项
dependency_layer_check:
  enabled: true
  tool: custom-eslint-plugin / manual-check
  
  checks:
    - name: "向上依赖检测"
      rule: "文件所在层级不能导入更高层级的实现"
      
    - name: "循环依赖检测"
      rule: "不允许A→B→A的导入链"
      
    - name: "跨层跳跃检测"
      rule: "只能导入相邻层或更低层"
  
  action_on_violation:
    - minor: 记录警告，继续执行
    - major: 阻断，要求修复
    - critical: 阻断，强制重构
```

### 4.2 在 code-review 中增加维度

```yaml
# code-review SKILL.md 第五维扩展
Stage 2 新增子项:
  - 架构合规性:
      - 依赖方向是否正确
      - 是否存在循环依赖
      - 是否违反分层规则
      - 文件是否放在正确的目录中
```

### 4.3 在 dev-builder 反合理化清单中增加

```
反合理化清单新增:
- [ ] 文件放置在正确的Layer目录中
- [ ] 导入语句符合分层规则
- [ ] 不存在向上的依赖关系
- [ ] 不存在循环依赖
```

