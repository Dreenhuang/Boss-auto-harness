<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/echarts.min.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        :root {
            --brand-red: #FF2442;
            --brand-red-hover: #E61E3C;
            --bg-gray: #F9F9F9;
            --text-main: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #EEEEEE;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: var(--text-main);
        }

        /* 移动端容器模拟 */
        .mobile-container {
            width: 375px;
            height: 812px;
            background-color: #fff;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 12px solid #1a1a1a;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 卡片样式 */
        .app-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .app-card:active {
            transform: scale(0.98);
        }

        /* 按钮交互 */
        .btn-primary {
            background-color: var(--brand-red);
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:active {
            background-color: var(--brand-red-hover);
            transform: scale(0.96);
        }

        .btn-ghost {
            transition: all 0.2s;
        }
        .btn-ghost:active {
            background-color: rgba(0,0,0,0.05);
            transform: scale(0.96);
        }

        /* 瀑布流 */
        .waterfall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 页面过渡 */
        .page-enter {
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: #F0F0F0;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: var(--brand-red);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 头像 */
        .avatar-full {
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>
<body>
<div class="mobile-container" id="app"></div>
<script>
    const state = {

    function navigate(page) {
        state.prevPage = state.currentPage;
        state.currentPage = page;
        
        if (page === 'message') {
            state.isLoadingMessage = true;
            setTimeout(() => {
                state.isLoadingMessage = false;
                render();
            }, 800);
        }
        
        render();
    }

    function toggleLike(id, e) {
        if (e) e.stopPropagation();
        if (state.likedPosts.has(id)) state.likedPosts.delete(id);
        else state.likedPosts.add(id);
        render();
    }

    function render() {
        const app = document.getElementById('app');
        let content = '';

        switch(state.currentPage) {
            case 'splash':
                content = renderSplash();
                break;
            case 'onboarding1':
            case 'onboarding2':
            case 'onboarding3':
                content = renderOnboarding();
                break;
            case 'questionnaire':
                content = renderQuestionnaire();
                break;
            case 'home':
                content = renderHome();
                break;
            case 'detail':
                content = renderDetail();
                break;
            case 'search':
                content = renderSearch();
                break;
            case 'knowledge':
                content = renderKnowledge();
                break;
            case 'paths':
                content = renderPaths();
                break;
            case 'profile':
                content = renderProfile();
                break;
            case 'message':

                break;

                break;

    function renderKnowledge() {

                                    <span class="text-[10px] px-2 py-0.5 rounded-full ${item.progress === 100 ? 'bg-green-50 text-green-500' : 'bg-blue-50 text-blue-500'} font-bold">
                                        ${item.tag}
                                    </span>
                                </div>
                                <div class="progress-bar mb-2">
                                    <div class="progress-inner" style="width: ${item.progress}%"></div>
                                </div>
                                <div class="flex justify-between items-center text-[10px] text-gray-400 font-bold">
                                    <span>${item.progress}% 完成</span>
                                    <span>${item.progress === 100 ? '查看证书' : '继续学习'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-8 flex items-center justify-between mb-4">
                        <h3 class="font-bold text-gray-800">最近浏览</h3>
                    </div>
                    <div class="space-y-3">
                        ${mockPosts.slice(0, 3).map(post => `
                            <div class="flex items-center space-x-3 bg-white p-2 rounded-xl">
                                <img src="${post.image}" class="w-12 h-12 rounded-lg object-cover">
                                <div class="flex-1">
                                    <div class="text-xs font-bold line-clamp-1">${post.title}</div>
                                    <div class="text-[9px] text-gray-400 mt-1">浏览于 2026-05-03</div>
                                </div>
                                <iconify-icon icon="ri:more-2-line" class="text-gray-300 px-2"></iconify-icon>
                            </div>
                        `).join('')}
                    </div>
                </div>

                ${renderTabBar('knowledge')}
            </div>
        `;
    }

    function renderPaths() {
        return `
            <div class="h-full flex flex-col bg-gray-50 page-enter">
                <div class="bg-white px-5 pt-12 pb-4 flex items-center border-b border-gray-50">
                    <iconify-icon icon="ri:arrow-left-s-line" class="text-2xl mr-4 btn-ghost" onclick="navigate('knowledge')"></iconify-icon>
                    <h1 class="text-lg font-bold">学习路径</h1>
                </div>
                <div class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar">
                    ${[
                        { title: '从零开始做全栈电商', level: '小白必备', lessons: 12, status: '进行中 60%' },
                        { title: 'AI工具入门与实战', level: '效率提升', lessons: 8, status: '未开始' },
                        { title: '产品经理的底层逻辑', level: '职业晋升', lessons: 20, status: '已完成 80%' }
                    ].map(p => `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm flex active:scale-[0.99] transition-transform">
                            <div class="w-28 bg-gray-100 flex items-center justify-center">
                                <img src="/agent-py/static/source/images/placeholder.svg" class="w-16">
                            </div>
                            <div class="flex-1 p-4 flex flex-col justify-between">
                                <div>
                                    <div class="text-[10px] font-bold text-[#FF2442] mb-1 uppercase tracking-wider">${p.level}</div>
                                    <h3 class="text-sm font-bold text-gray-800 line-clamp-1">${p.title}</h3>
                                    <p class="text-[11px] text-gray-400 mt-1">${p.lessons} 节必修课</p>
                                </div>
                                <div class="flex items-center justify-between mt-4">
                                    <span class="text-[10px] font-bold text-gray-500">${p.status}</span>
                                    <button class="bg-[#FF2442] text-white px-4 py-1.5 rounded-full text-[10px] font-bold btn-primary">进入学习</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function markMessageRead(id) {
        const msg = state.messages.find(m => m.id === id);
        if (msg) msg.unread = false;
        render();
    }

    function switchMessageTab(tab) {
        state.messageTab = tab;
        render();
    }

    function renderMessage() {
        if (state.isLoadingMessage) {
            return `
                <div class="h-full bg-white flex flex-col page-enter">
                    <div class="px-4 pt-12 pb-4 flex items-center justify-between border-b border-gray-50">
                        <h1 class="text-lg font-bold">消息</h1>
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center">
                        <div class="w-8 h-8 border-4 border-gray-100 border-t-[#FF2442] rounded-full animate-spin mb-4"></div>
                        <p class="text-gray-400 text-xs">正在获取消息...</p>
                    </div>
                    ${renderTabBar('message')}
                </div>
            `;
        }

        const filteredMessages = state.messages.filter(msg => {
            if (state.messageTab === 'all') return true;
            if (state.messageTab === 'interaction') {
                return ['interaction', 'follow', 'comment'].includes(msg.type);
            }
            return msg.type === state.messageTab;
        });

        const categories = [
            { id: 'interaction', icon: 'ri:heart-3-line', label: '收到的赞', color: 'bg-red-50 text-red-500' },
            { id: 'follow', icon: 'ri:user-add-line', label: '新增关注', color: 'bg-blue-50 text-blue-500' },
            { id: 'comment', icon: 'ri:chat-3-line', label: '评论和 @', color: 'bg-green-50 text-green-500' }
        ];

        return `
            <div class="h-full bg-white flex flex-col page-enter">
                <!-- Header -->
                <div class="px-4 pt-12 pb-4 flex items-center justify-between sticky top-0 bg-white z-10 border-b border-gray-50">
                    <h1 class="text-lg font-bold">消息</h1>
                    <div class="flex items-center space-x-4">
                        <span class="text-xs text-gray-400" onclick="state.messages.forEach(m => m.unread = false); render();">清除未读</span>
                        <iconify-icon icon="ri:settings-4-line" class="text-xl"></iconify-icon>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar">
                    <!-- Quick Actions -->
                    <div class="flex justify-around py-6 border-b border-gray-50">
                        ${categories.map(cat => `
                            <div class="flex flex-col items-center space-y-2 cursor-pointer" onclick="switchMessageTab('${cat.id}')">
                                <div class="w-12 h-12 ${cat.color} rounded-2xl flex items-center justify-center">
                                    <iconify-icon icon="${cat.icon}" class="text-2xl"></iconify-icon>
                                </div>
                                <span class="text-[11px] text-gray-600 font-medium">${cat.label}</span>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Tabs -->
                    <div class="flex px-4 py-3 space-x-6 border-b border-gray-50 overflow-x-auto no-scrollbar">
                        <button onclick="switchMessageTab('all')" class="text-sm flex-shrink-0 transition-all ${state.messageTab === 'all' ? 'font-bold text-black border-b-2 border-[#FF2442] pb-1' : 'text-gray-400'}">全部</button>
                        <button onclick="switchMessageTab('interaction')" class="text-sm flex-shrink-0 transition-all ${['interaction', 'follow', 'comment'].includes(state.messageTab) ? 'font-bold text-black border-b-2 border-[#FF2442] pb-1' : 'text-gray-400'}">互动</button>
                        <button onclick="switchMessageTab('private')" class="text-sm flex-shrink-0 transition-all ${state.messageTab === 'private' ? 'font-bold text-black border-b-2 border-[#FF2442] pb-1' : 'text-gray-400'}">私信</button>
                        <button onclick="switchMessageTab('system')" class="text-sm flex-shrink-0 transition-all ${state.messageTab === 'system' ? 'font-bold text-black border-b-2 border-[#FF2442] pb-1' : 'text-gray-400'}">系统</button>
                    </div>

                    <!-- Message List -->
                    <div class="divide-y divide-gray-50">
                        ${filteredMessages.length > 0 ? filteredMessages.map(msg => `
                            <div class="flex items-center px-4 py-4 space-x-3 active:bg-gray-50 transition-colors cursor-pointer" onclick="markMessageRead(${msg.id})">
                                <div class="relative">
                                    <img src="${msg.avatar}" alt="${msg.name}" class="w-12 h-12 rounded-full object-cover bg-gray-100">
                                    ${msg.unread ? '<div class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-[#FF2442] border-2 border-white rounded-full"></div>' : ''}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center justify-between mb-0.5">
                                        <h4 class="text-sm font-bold text-gray-900 truncate">${msg.name}</h4>
                                        <span class="text-[10px] text-gray-400">${msg.time}</span>
                                    </div>
                                    <p class="text-xs text-gray-500 truncate">${msg.content}</p>
                                </div>
                            </div>
                        `).join('') : `
                            <div class="flex flex-col items-center justify-center py-20 text-center">
                                <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                                    <iconify-icon icon="ri:message-2-line" class="text-4xl text-gray-200"></iconify-icon>
                                </div>
                                <p class="text-gray-400 text-xs">暂无相关消息</p>
                            </div>
                        `}
                    </div>
                </div>

                ${renderTabBar('message')}
            </div>
        `;
    }

    function renderProfile() {
        const stats = state.userStats;
        return `
            <div class="h-full flex flex-col bg-white page-enter">
                <!-- 顶部 -->
                <div class="relative h-64 bg-gray-50">
                    <div class="absolute top-12 left-4 right-4 flex justify-between">
                        <iconify-icon icon="ri:menu-line" class="text-2xl text-gray-700 btn-ghost"></iconify-icon>
                        <div class="flex space-x-4">
                            <iconify-icon icon="ri:share-forward-line" class="text-2xl text-gray-700 btn-ghost"></iconify-icon>
                            <iconify-icon icon="ri:settings-4-line" class="text-2xl text-gray-700 btn-ghost"></iconify-icon>
                        </div>
                    </div>
                    <div class="absolute -bottom-10 left-6 flex flex-col items-center">
                        <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden shadow-md">
                            <img src="/agent-py/static/source/images/placeholder.svg" class="avatar-full w-full h-full">
                        </div>
                    </div>
                    <div class="absolute bottom-4 right-6">
                        <button class="px-6 py-2 border border-gray-200 rounded-full text-xs font-bold btn-ghost" onclick="navigate('wechatGuide')">编辑资料</button>
                    </div>
                </div>

                <div class="pt-12 px-6">
                    <h1 class="text-xl font-bold mb-1">${state.userName}</h1>
                    <p class="text-[11px] text-gray-400 mb-4">小红书号：vibe_pm_2026</p>
                    <p class="text-xs text-gray-600 leading-relaxed mb-6">正在探索 AI 的产品经理，希望在这里把复杂的技术讲给每个人听。 ✨</p>
                    
                    <div class="flex space-x-8 mb-8">
                        <div class="text-center">
                            <div class="font-bold text-sm">${stats.following}</div>
                            <div class="text-[10px] text-gray-400 font-medium">关注</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-sm">${stats.followers}</div>
                            <div class="text-[10px] text-gray-400 font-medium">粉丝</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-sm">${stats.likes}</div>
                            <div class="text-[10px] text-gray-400 font-medium">获赞与收藏</div>
                        </div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex-1 flex flex-col min-h-0">
                    <div class="flex border-b border-gray-50 justify-center space-x-12 text-sm font-bold text-gray-400">
                        <span class="py-3 border-b-2 border-[#FF2442] text-black">笔记</span>
                        <span class="py-3">收藏</span>
                        <span class="py-3">赞过</span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-1 bg-gray-50 no-scrollbar">
                        <div class="grid grid-cols-3 gap-0.5">
                            ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(i => `
                                <div class="aspect-square bg-gray-200 relative group overflow-hidden active:opacity-90">
                                    <img src="/agent-py/static/source/images/placeholder.svg" class="w-full h-full object-cover">
                                    <div class="absolute bottom-1.5 left-1.5 flex items-center text-white space-x-0.5">
                                        <iconify-icon icon="ri:heart-fill" class="text-[10px]"></iconify-icon>
                                        <span class="text-[9px] font-bold">128</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                ${renderTabBar('profile')}
            </div>
        `;
    }

    function renderWechatGuide() {
        return `
            <div class="h-full bg-white flex flex-col items-center justify-center p-8 page-enter">
                <div class="w-20 h-20 bg-green-500 rounded-[22px] flex items-center justify-center mb-10 shadow-lg shadow-green-100">
                    <iconify-icon icon="ri:wechat-fill" class="text-white text-4xl"></iconify-icon>
                </div>
                <h2 class="text-xl font-bold mb-2">添加助教微信</h2>
                <p class="text-gray-400 text-sm mb-12 text-center px-4">登录后解锁全部功能，还能加入 2026 AI 学习群，获取海量学习资料</p>
                
                <div class="w-full bg-gray-50 rounded-2xl p-6 mb-10 flex flex-col items-center border border-dashed border-gray-200">
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest mb-3">微信号</div>
                    <div class="text-xl font-bold mb-4 tracking-wider">VibePM2026</div>
                    <button class="bg-green-500 text-white px-8 py-2.5 rounded-full font-bold text-sm btn-primary">复制微信号</button>
                </div>

                <div class="w-full space-y-4">
                    <button onclick="navigate('profile')" class="bg-gray-100 text-gray-600 w-full py-4 rounded-full font-bold text-sm btn-ghost">稍后再说</button>
                    <p class="text-center text-[10px] text-gray-300">登录即代表同意 用户协议 与 隐私政策</p>
                </div>
            </div>
        `;
    }

    function renderSearch() {
        return `
            <div class="h-full bg-white flex flex-col page-enter">
                <div class="px-4 pt-12 pb-3 flex items-center space-x-3">
                    <div class="flex-1 bg-gray-100 rounded-full h-10 flex items-center px-4 space-x-2">
                        <iconify-icon icon="ri:search-line" class="text-gray-400"></iconify-icon>
                        <input type="text" placeholder="React 怎么学？" class="bg-transparent border-none outline-none text-sm w-full" autofocus>
                    </div>
                    <button class="text-sm font-bold text-gray-800 btn-ghost" onclick="navigate('home')">取消</button>
                </div>
                <div class="p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-sm">热门搜索</h3>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-10">
                        ${['React 核心原理', 'AI 产品经理', '电商全栈选型', 'Prompt 模板', '小程序开发', 'Python 自动化', '技术概念比喻'].map(tag => `
                            <span class="px-4 py-1.5 bg-gray-50 rounded-full text-xs text-gray-600 border border-gray-100">${tag}</span>
                        `).join('')}
                    </div>
                    
                    <h3 class="font-bold text-sm mb-6">历史记录</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-sm text-gray-500">
                            <div class="flex items-center space-x-3">
                                <iconify-icon icon="ri:history-line"></iconify-icon>
                                <span>微服务架构</span>
                            </div>
                            <iconify-icon icon="ri:close-line"></iconify-icon>
                        </div>
                        <div class="flex items-center justify-between text-sm text-gray-500">
                            <div class="flex items-center space-x-3">
                                <iconify-icon icon="ri:history-line"></iconify-icon>
                                <span>低代码工具对比</span>
                            </div>
                            <iconify-icon icon="ri:close-line"></iconify-icon>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderTabBar(active) {
        const tabs = [
            { id: 'home', icon: 'ri:home-5-line', activeIcon: 'ri:home-5-fill', label: '首页' },
            { id: 'knowledge', icon: 'ri:book-read-line', activeIcon: 'ri:book-read-fill', label: '知识库' },
            { id: 'add', icon: 'ri:add-line', activeIcon: 'ri:add-fill', label: '', special: true },
            { id: 'message', icon: 'ri:message-3-line', activeIcon: 'ri:message-3-fill', label: '消息' },
            { id: 'profile', icon: 'ri:user-3-line', activeIcon: 'ri:user-3-fill', label: '我' }
        ];

        return `
            <div class="bg-white border-t border-gray-100 h-20 flex items-center justify-around px-4 sticky bottom-0 z-20">
                ${tabs.map(tab => {
                    if (tab.special) {
                        return `
                            <div class="bg-[#FF2442] w-12 h-9 rounded-xl flex items-center justify-center text-white btn-primary shadow-md" onclick="navigate('wechatGuide')">
                                <iconify-icon icon="${tab.icon}" class="text-2xl font-bold"></iconify-icon>
                            </div>
                        `;
                    }
                    const isActive = active === tab.id;
                    return `
                        <div class="flex flex-col items-center space-y-1 btn-ghost p-2" onclick="navigate('${tab.id}')">
                            <iconify-icon icon="${isActive ? tab.activeIcon : tab.icon}" class="text-2xl ${isActive ? 'text-black' : 'text-gray-300'}"></iconify-icon>
                            <span class="text-[9px] font-bold ${isActive ? 'text-black' : 'text-gray-400'}">${tab.label}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // 初始化渲染
    render();
</script>
</body>
</html>
